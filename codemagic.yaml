workflows:
  build-mac:
    name: Build Mac DMG
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      node: 20
      vars:
        GH_TOKEN: $GH_TOKEN

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Generate 512x512 icon
        script: sips -z 512 512 src/renderer/icons/icon256.png --out src/renderer/icons/icon512.png

      - name: Build DMG
        script: npx electron-builder --publish never

      - name: Publish to GitHub Releases
        script: |
          VERSION=$(node -p "require('./package.json').version")
          gh release delete "v$VERSION" --repo colindiffer/ruddr_mac_app --yes 2>/dev/null || true
          gh release create "v$VERSION" dist/*.dmg dist/*.blockmap dist/latest-mac.yml \
            --repo colindiffer/ruddr_mac_app \
            --title "v$VERSION" \
            --notes "Mac build v$VERSION — right-click → Open on first launch (no code signing)"

    artifacts:
      - dist/*.dmg
      - dist/*.blockmap
      - dist/latest-mac.yml
