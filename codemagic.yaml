workflows:
  build-mac:
    name: Build Mac DMG
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      node: 20

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build DMG
        script: npm run build

    artifacts:
      - dist/*.dmg
      - dist/*.blockmap
      - dist/latest-mac.yml
