workflows:
  build-mac:
    name: Build Mac DMG
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      node: 20

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Generate 512x512 icon
        script: sips -z 512 512 src/renderer/icons/icon256.png --out src/renderer/icons/icon512.png

      - name: Build DMG
        script: npx electron-builder --publish never

    artifacts:
      - dist/*.dmg
      - dist/*.blockmap
      - dist/latest-mac.yml
